<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Flappy Bird (Lookalike)</title>

  <!-- Pixel-ish font (close vibe). If offline, it falls back gracefully. -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

  <style>
    :root{
      --ui-shadow: 0 10px 0 rgba(0,0,0,.10);
      --pixel: "Press Start 2P", ui-monospace, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      --sky: #9fd5f0;
      --footer: #3a3f45;
    }

    * { box-sizing: border-box; }
    html, body {
      height: 100%;
      margin: 0;
      background: #111;
      font-family: var(--pixel);
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .app {
      height: 100%;
      display: grid;
      grid-template-rows: 1fr auto;
      background: var(--sky);
    }

    /* Game area */
    .stage {
      position: relative;
      overflow: hidden;
      background: var(--sky);
      display: grid;
      place-items: center;
      padding-top: env(safe-area-inset-top);
    }

    canvas {
      width: min(100vw, 520px);
      height: calc(min(100vw, 520px) * 1.65);
      max-height: calc(100vh - 84px - env(safe-area-inset-top) - env(safe-area-inset-bottom));
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      display: block;
    }

    /* Overlay UI */
    .overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      display: grid;
      place-items: center;
    }

    .top-score {
      position: absolute;
      top: 26px;
      left: 0;
      right: 0;
      text-align: center;
      color: #111;
      font-size: 20px;
      text-shadow: 2px 2px 0 rgba(255,255,255,.8);
      pointer-events: none;
      opacity: 0;
      transform: translateY(-4px);
      transition: opacity .15s ease, transform .15s ease;
    }
    .top-score.show {
      opacity: 1;
      transform: translateY(0);
    }

    .title {
      position: absolute;
      top: 120px;
      display: flex;
      gap: 6px;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      transform: scale(1);
      transition: opacity .2s ease, transform .2s ease;
    }
    .title.hidden { opacity: 0; transform: scale(.98); }

    .title .word {
      display: flex;
      gap: 2px;
      filter: drop-shadow(3px 3px 0 rgba(0,0,0,.25));
    }
    .title .tile {
      width: 26px;
      height: 30px;
      border: 3px solid rgba(0,0,0,.55);
      border-radius: 2px;
      display: grid;
      place-items: center;
      font-size: 14px;
      line-height: 1;
      color: rgba(0,0,0,.65);
      background: #fff;
    }
    .title .tile span {
      transform: translateY(1px);
    }
    .title .r {
      margin-left: 8px;
      font-size: 14px;
      color: rgba(255,255,255,.9);
      text-shadow: 2px 2px 0 rgba(0,0,0,.35);
    }

    .btn {
      pointer-events: auto;
      border: 4px solid rgba(0,0,0,.55);
      border-radius: 10px;
      padding: 14px 22px;
      font-family: var(--pixel);
      font-size: 18px;
      line-height: 1;
      cursor: pointer;
      background: #6fb0d4;
      color: #0b2e3f;
      text-shadow: 2px 2px 0 rgba(255,255,255,.55);
      box-shadow: var(--ui-shadow);
    }
    .btn:active { transform: translateY(2px); box-shadow: 0 6px 0 rgba(0,0,0,.10); }

    .start-btn {
      position: absolute;
      top: 62%;
    }

    .tap-hint {
      position: absolute;
      top: 54%;
      display: flex;
      align-items: center;
      gap: 12px;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity .2s ease, transform .2s ease;
      pointer-events: none;
    }
    .tap-hint.show { opacity: 1; transform: translateY(0); }

    .tap-tag {
      background: #d95b38;
      color: #fff;
      border: 3px solid rgba(0,0,0,.55);
      padding: 7px 10px;
      border-radius: 7px;
      font-size: 14px;
      box-shadow: 0 6px 0 rgba(0,0,0,.08);
    }
    .hand {
      width: 54px;
      height: 54px;
      filter: drop-shadow(3px 3px 0 rgba(0,0,0,.18));
      animation: tap 1.1s infinite ease-in-out;
    }
    @keyframes tap {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(8px) scale(1.02); }
    }

    .gameover {
      position: absolute;
      top: 34%;
      display: grid;
      place-items: center;
      gap: 14px;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity .18s ease, transform .18s ease;
      pointer-events: none;
    }
    .gameover.show { opacity: 1; transform: translateY(0); pointer-events: auto; }

    .gameover .label {
      font-size: 34px;
      color: #e8b070;
      text-shadow:
        3px 3px 0 rgba(0,0,0,.35),
        -2px -2px 0 rgba(255,255,255,.35);
      letter-spacing: 2px;
    }

    .panel {
      width: 360px;
      max-width: calc(100vw - 36px);
      background: rgba(190, 220, 190, 0.85);
      border: 5px solid rgba(0,0,0,.55);
      border-radius: 8px;
      padding: 18px 18px 16px;
      box-shadow: var(--ui-shadow);
      position: relative;
      overflow: hidden;
    }

    .panel .row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
    }

    .panel .left {
      width: 110px;
      display: grid;
      place-items: center;
    }

    .medal {
      width: 68px;
      height: 68px;
      border-radius: 999px;
      background: rgba(255,255,255,.12);
      border: 4px dashed rgba(255,255,255,.5);
      opacity: .55;
    }

    .panel .right {
      flex: 1;
      display: grid;
      gap: 10px;
      padding-top: 2px;
      color: rgba(0,0,0,.45);
      font-size: 14px;
    }

    .panel .kv {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    .digits {
      display: inline-grid;
      grid-auto-flow: column;
      gap: 4px;
      align-items: center;
    }
    .digit {
      width: 26px;
      height: 34px;
      display: grid;
      place-items: center;
      background: #f5f5f5;
      border: 3px solid rgba(0,0,0,.65);
      border-radius: 2px;
      color: #111;
      font-size: 16px;
    }

    .new-badge {
      position: absolute;
      left: 50%;
      top: 54%;
      transform: translate(-50%, -50%);
      background: #e33a2c;
      color: #fff;
      border: 3px solid rgba(0,0,0,.55);
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 14px;
      display: none;
      box-shadow: 0 6px 0 rgba(0,0,0,.08);
    }
    .new-badge.show { display: inline-block; }

    .actions {
      display: flex;
      gap: 14px;
      justify-content: space-between;
      width: 420px;
      max-width: calc(100vw - 36px);
      pointer-events: auto;
    }

    .btn-green {
      background: #5ec151;
      color: #0b2e0b;
      text-shadow: 2px 2px 0 rgba(255,255,255,.55);
      flex: 1;
      padding: 16px 0;
      font-size: 18px;
    }

    /* Footer like screenshot */
    .footer {
      height: 84px;
      background: var(--footer);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 18px;
      padding-bottom: env(safe-area-inset-bottom);
      border-top: 3px solid rgba(0,0,0,.25);
    }
    .footer .mini-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      color: rgba(255,255,255,.85);
      font-size: 10px;
      opacity: .95;
    }
    .footer .burger {
      width: 54px;
      height: 44px;
      border-radius: 8px;
      border: 2px solid rgba(0,0,0,.35);
      background: rgba(255,255,255,.06);
      display: grid;
      place-items: center;
    }
    .footer .burger .lines {
      width: 26px;
      height: 16px;
      display: grid;
      gap: 4px;
    }
    .footer .burger .lines span {
      height: 3px;
      background: rgba(255,255,255,.55);
      border-radius: 2px;
    }

    /* Tiny helper */
    .sr-only {
      position:absolute;
      width:1px;height:1px;
      padding:0;margin:-1px;
      overflow:hidden;clip:rect(0,0,0,0);
      white-space:nowrap;border:0;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="stage" id="stage">
      <canvas id="game" width="360" height="600" aria-label="Flappy Bird canvas"></canvas>

      <div class="overlay">
        <div class="top-score" id="topScore">0</div>

        <!-- Title: blocky colorful tiles -->
        <div class="title" id="title">
          <div class="word" aria-hidden="true">
            <div class="tile" style="background:#f2df6e"><span>F</span></div>
            <div class="tile" style="background:#e668a4"><span>L</span></div>
            <div class="tile" style="background:#8fd0e6"><span>A</span></div>
            <div class="tile" style="background:#8f79ff"><span>P</span></div>
            <div class="tile" style="background:#9ed365"><span>P</span></div>
            <div class="tile" style="background:#8f79ff"><span>Y</span></div>
          </div>
          <div class="word" aria-hidden="true">
            <div class="tile" style="background:#e668a4"><span>B</span></div>
            <div class="tile" style="background:#f2df6e"><span>I</span></div>
            <div class="tile" style="background:#9ed365"><span>R</span></div>
            <div class="tile" style="background:#8fd0e6"><span>D</span></div>
          </div>
          <div class="r">®</div>
        </div>

        <!-- Start button (splash) -->
        <button class="btn start-btn" id="startBtn">START</button>

        <!-- Tap hint (pre-play) -->
        <div class="tap-hint" id="tapHint" aria-hidden="true">
          <svg class="hand" viewBox="0 0 64 64" fill="none">
            <path d="M26 58c-7 0-12-5-12-12V27c0-2 2-4 4-4s4 2 4 4v12" stroke="#111" stroke-width="4" stroke-linecap="round"/>
            <path d="M22 39V18c0-2 2-4 4-4s4 2 4 4v17" stroke="#111" stroke-width="4" stroke-linecap="round"/>
            <path d="M30 35V16c0-2 2-4 4-4s4 2 4 4v19" stroke="#111" stroke-width="4" stroke-linecap="round"/>
            <path d="M38 37V20c0-2 2-4 4-4s4 2 4 4v22c0 9-7 16-16 16h-4Z" stroke="#111" stroke-width="4" stroke-linecap="round"/>
            <path d="M15 47c1 6 6 11 13 11" stroke="#111" stroke-width="4" stroke-linecap="round"/>
            <path d="M18 10l4 4M10 18l4 4M26 6l2 5" stroke="#111" stroke-width="4" stroke-linecap="round"/>
          </svg>
          <div class="tap-tag">TAP</div>
        </div>

        <!-- Game over -->
        <div class="gameover" id="gameOver">
          <div class="label">GAME OVER</div>

          <div class="panel">
            <div class="row">
              <div class="left">
                <div class="medal" id="medal"></div>
              </div>
              <div class="right">
                <div class="kv">
                  <div>SCORE</div>
                  <div class="digits" id="scoreDigits"></div>
                </div>
                <div class="kv">
                  <div>HIGH SCORE</div>
                  <div class="digits" id="bestDigits"></div>
                </div>
              </div>
            </div>

            <div class="new-badge" id="newBadge">NEW</div>
          </div>

          <div class="actions">
            <button class="btn btn-green" id="playBtn">PLAY</button>
            <button class="btn btn-green" id="shareBtn">SHARE</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Footer bar like the screenshot -->
    <div class="footer">
      <div class="mini-logo" aria-hidden="true">
        <div style="transform:scale(.85); transform-origin:left center;">
          <div style="display:flex; gap:2px; filter: drop-shadow(2px 2px 0 rgba(0,0,0,.35));">
            <div style="width:16px;height:18px;border:2px solid rgba(0,0,0,.55);background:#f2df6e;display:grid;place-items:center;font-size:10px;color:#222;">F</div>
            <div style="width:16px;height:18px;border:2px solid rgba(0,0,0,.55);background:#e668a4;display:grid;place-items:center;font-size:10px;color:#222;">L</div>
            <div style="width:16px;height:18px;border:2px solid rgba(0,0,0,.55);background:#8fd0e6;display:grid;place-items:center;font-size:10px;color:#222;">A</div>
            <div style="width:16px;height:18px;border:2px solid rgba(0,0,0,.55);background:#8f79ff;display:grid;place-items:center;font-size:10px;color:#222;">P</div>
            <div style="width:16px;height:18px;border:2px solid rgba(0,0,0,.55);background:#9ed365;display:grid;place-items:center;font-size:10px;color:#222;">P</div>
            <div style="width:16px;height:18px;border:2px solid rgba(0,0,0,.55);background:#8f79ff;display:grid;place-items:center;font-size:10px;color:#222;">Y</div>
          </div>
          <div style="height:4px"></div>
          <div style="display:flex; gap:2px; filter: drop-shadow(2px 2px 0 rgba(0,0,0,.35));">
            <div style="width:16px;height:18px;border:2px solid rgba(0,0,0,.55);background:#e668a4;display:grid;place-items:center;font-size:10px;color:#222;">B</div>
            <div style="width:16px;height:18px;border:2px solid rgba(0,0,0,.55);background:#f2df6e;display:grid;place-items:center;font-size:10px;color:#222;">I</div>
            <div style="width:16px;height:18px;border:2px solid rgba(0,0,0,.55);background:#9ed365;display:grid;place-items:center;font-size:10px;color:#222;">R</div>
            <div style="width:16px;height:18px;border:2px solid rgba(0,0,0,.55);background:#8fd0e6;display:grid;place-items:center;font-size:10px;color:#222;">D</div>
          </div>
        </div>
      </div>

      <div class="burger" aria-label="Menu" title="Menu">
        <div class="lines">
          <span></span><span></span><span></span>
        </div>
      </div>
    </div>
  </div>

  <script>
    (() => {
      // 🔨🤖🔧 Flappy Bird lookalike (original art drawn procedurally)

      const canvas = document.getElementById("game");
      const ctx = canvas.getContext("2d");

      // UI elements
      const titleEl = document.getElementById("title");
      const startBtn = document.getElementById("startBtn");
      const tapHint = document.getElementById("tapHint");
      const gameOverEl = document.getElementById("gameOver");
      const topScoreEl = document.getElementById("topScore");
      const scoreDigitsEl = document.getElementById("scoreDigits");
      const bestDigitsEl = document.getElementById("bestDigits");
      const newBadgeEl = document.getElementById("newBadge");
      const playBtn = document.getElementById("playBtn");
      const shareBtn = document.getElementById("shareBtn");

      // Game constants tuned to the screenshot proportions
      const W = canvas.width;   // 360
      const H = canvas.height;  // 600

      const GROUND_H = 82;
      const CLOUD_BAND_Y = 330;
      const CITY_Y = 380;

      const PIPE_W = 68;
      const PIPE_GAP = 150;
      const PIPE_SPEED = 2.2;
      const PIPE_SPAWN_DIST = 210;

      const BIRD_X = 125;

      const GRAVITY = 0.42;
      const FLAP = -7.2;
      const MAX_FALL = 11;

      // State
      const State = Object.freeze({ SPLASH: "splash", READY: "ready", PLAYING: "playing", GAMEOVER: "gameover" });
      let state = State.SPLASH;

      // Background scroll
      let t = 0;
      let groundScroll = 0;
      let cityScroll = 0;

      // Bird
      const bird = {
        x: BIRD_X,
        y: 240,
        vy: 0,
        r: 12,
        flapAnim: 0,
      };

      // Pipes
      let pipes = [];
      let score = 0;
      let best = Number(localStorage.getItem("flappy_best") || "0");

      // HiDPI crisp pixels
      function resizeToDevice() {
        // Keep internal resolution constant for crisp pixel vibe.
        // Canvas CSS scales it; we keep internal W/H fixed.
        ctx.imageSmoothingEnabled = false;
      }
      resizeToDevice();

      function resetRun() {
        pipes = [];
        score = 0;
        bird.y = 240;
        bird.vy = 0;
        bird.flapAnim = 0;
        groundScroll = 0;
        cityScroll = 0;
        t = 0;

        // spawn first pipe a bit ahead
        addPipe(W + 120);
      }

      function addPipe(x) {
        // Limit gap center so it's always passable.
        const minTop = 80;
        const maxTop = H - GROUND_H - 80 - PIPE_GAP;
        const topH = Math.floor(minTop + Math.random() * (maxTop - minTop));
        pipes.push({
          x,
          topH,
          passed: false,
        });
      }

      // Simple AABB collision helpers
      function rectsOverlap(ax, ay, aw, ah, bx, by, bw, bh) {
        return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
      }

      function birdHitsPipe(p) {
        const birdBox = { x: bird.x - 14, y: bird.y - 12, w: 28, h: 24 };

        const topPipe = { x: p.x, y: 0, w: PIPE_W, h: p.topH };
        const botPipe = { x: p.x, y: p.topH + PIPE_GAP, w: PIPE_W, h: (H - GROUND_H) - (p.topH + PIPE_GAP) };

        return rectsOverlap(birdBox.x, birdBox.y, birdBox.w, birdBox.h, topPipe.x, topPipe.y, topPipe.w, topPipe.h) ||
               rectsOverlap(birdBox.x, birdBox.y, birdBox.w, birdBox.h, botPipe.x, botPipe.y, botPipe.w, botPipe.h);
      }

      function birdHitsGround() {
        return bird.y + 12 >= H - GROUND_H;
      }

      function setState(next) {
        state = next;

        // UI toggles to match screenshots
        if (state === State.SPLASH) {
          titleEl.classList.remove("hidden");
          startBtn.style.display = "inline-block";
          tapHint.classList.remove("show");
          gameOverEl.classList.remove("show");
          topScoreEl.classList.remove("show");
        }

        if (state === State.READY) {
          titleEl.classList.add("hidden");
          startBtn.style.display = "none";
          tapHint.classList.add("show");
          gameOverEl.classList.remove("show");
          topScoreEl.classList.add("show");
          topScoreEl.textContent = "0";
        }

        if (state === State.PLAYING) {
          tapHint.classList.remove("show");
          gameOverEl.classList.remove("show");
          topScoreEl.classList.add("show");
        }

        if (state === State.GAMEOVER) {
          tapHint.classList.remove("show");
          gameOverEl.classList.add("show");
          topScoreEl.classList.remove("show");
        }
      }

      // Digit tiles like screenshot
      function renderDigits(el, value) {
        const s = String(value);
        el.innerHTML = "";
        for (const ch of s) {
          const d = document.createElement("div");
          d.className = "digit";
          d.textContent = ch;
          el.appendChild(d);
        }
      }

      function endGame() {
        setState(State.GAMEOVER);

        const prevBest = best;
        if (score > best) {
          best = score;
          localStorage.setItem("flappy_best", String(best));
        }

        renderDigits(scoreDigitsEl, score);
        renderDigits(bestDigitsEl, best);

        newBadgeEl.classList.toggle("show", score > prevBest);
      }

      // Procedural pixel-art drawing (original but very similar)
      function pxRect(x, y, w, h, fill, stroke, sw = 0) {
        ctx.fillStyle = fill;
        ctx.fillRect(x|0, y|0, w|0, h|0);
        if (sw > 0) {
          ctx.strokeStyle = stroke;
          ctx.lineWidth = sw;
          ctx.strokeRect((x + sw/2)|0, (y + sw/2)|0, (w - sw)|0, (h - sw)|0);
          ctx.lineWidth = 1;
        }
      }

      function drawSky() {
        // Solid sky
        ctx.fillStyle = "#9fd5f0";
        ctx.fillRect(0,0,W,H);

        // subtle vertical gradient band at top
        const g = ctx.createLinearGradient(0,0,0,120);
        g.addColorStop(0, "rgba(255,255,255,.15)");
        g.addColorStop(1, "rgba(255,255,255,0)");
        ctx.fillStyle = g;
        ctx.fillRect(0,0,W,120);
      }

      function drawCity() {
        // far city blocks
        const baseY = CITY_Y;
        const scroll = cityScroll % W;

        function building(x, w, h, tint) {
          ctx.fillStyle = tint;
          ctx.fillRect(x, baseY - h, w, h);
          // windows
          ctx.fillStyle = "rgba(255,255,255,.28)";
          for (let yy = baseY - h + 10; yy < baseY - 10; yy += 14) {
            for (let xx = x + 8; xx < x + w - 8; xx += 14) {
              ctx.fillRect(xx|0, yy|0, 6, 8);
            }
          }
        }

        for (let i=0;i<8;i++){
          const x = -scroll + i*90;
          const w = 64 + (i%3)*10;
          const h = 70 + (i%4)*22;
          building(x, w, h, "rgba(120,170,190,.28)");
        }
        for (let i=0;i<7;i++){
          const x = -scroll*1.2 + i*110 + 20;
          const w = 72 + (i%2)*12;
          const h = 95 + (i%5)*18;
          building(x, w, h, "rgba(120,170,190,.22)");
        }
      }

      function drawCloudBand() {
        // fluffy white band like screenshot
        const y = CLOUD_BAND_Y - 26;
        ctx.fillStyle = "rgba(255,255,255,.92)";

        // repeated circles
        const scroll = (t * 0.35) % 120;
        for (let x = -160 - scroll; x < W + 160; x += 120) {
          blob(x+0, y+28, 46);
          blob(x+38, y+20, 56);
          blob(x+82, y+30, 42);
          blob(x+118, y+26, 50);
        }

        // top trim soft
        ctx.fillStyle = "rgba(255,255,255,.72)";
        ctx.fillRect(0, CLOUD_BAND_Y+22, W, 18);

        function blob(cx, cy, r) {
          ctx.beginPath();
          ctx.arc(cx, cy, r, 0, Math.PI*2);
          ctx.fill();
        }
      }

      function drawGround() {
        const y = H - GROUND_H;
        // dirt
        pxRect(0, y+22, W, GROUND_H-22, "#d9d1a6", "#000", 0);
        // grassy top with checker pattern
        pxRect(0, y, W, 28, "#82c86e", "rgba(0,0,0,.6)", 0);

        const tile = 18;
        const scroll = (groundScroll % tile);
        for (let x = -tile - scroll; x < W + tile; x += tile) {
          pxRect(x, y+6, tile, 16, (Math.floor((x+scroll)/tile) % 2 === 0) ? "#6dbf58" : "#89d672", "#000", 0);
          // little highlight
          pxRect(x+2, y+8, 4, 4, "rgba(255,255,255,.22)", "#000", 0);
        }

        // border line
        ctx.fillStyle = "rgba(0,0,0,.18)";
        ctx.fillRect(0, y+28, W, 3);
      }

      function drawPipe(x, topH) {
        const border = "rgba(0,0,0,.55)";
        const body = "#5a9c43";
        const body2 = "#6dbf58";

        // top pipe (goes down)
        // body
        pxRect(x, 0, PIPE_W, topH, body, border, 4);
        // inner highlight stripes
        pxRect(x+10, 4, 10, topH-8, body2, border, 0);
        pxRect(x+30, 4, 8, topH-8, "rgba(255,255,255,.08)", border, 0);

        // lip
        const lipH = 26;
        pxRect(x-4, topH-lipH, PIPE_W+8, lipH, body2, border, 4);
        pxRect(x+6, topH-lipH+4, PIPE_W-12, lipH-8, "rgba(255,255,255,.10)", border, 0);

        // bottom pipe (goes up)
        const botY = topH + PIPE_GAP;
        const botH = (H - GROUND_H) - botY;

        pxRect(x, botY, PIPE_W, botH, body, border, 4);
        pxRect(x+10, botY+4, 10, botH-8, body2, border, 0);
        pxRect(x+30, botY+4, 8, botH-8, "rgba(255,255,255,.08)", border, 0);

        // lip
        pxRect(x-4, botY, PIPE_W+8, lipH, body2, border, 4);
        pxRect(x+6, botY+4, PIPE_W-12, lipH-8, "rgba(255,255,255,.10)", border, 0);
      }

      function drawBird() {
        // bird body (pixel-ish)
        const x = bird.x, y = bird.y;

        // tiny wing flap animation
        const flap = (state === State.PLAYING || state === State.READY) ? (Math.sin(bird.flapAnim) * 2) : 0;

        // body
        ctx.fillStyle = "#f3dc63";
        ctx.strokeStyle = "rgba(0,0,0,.65)";
        ctx.lineWidth = 3;
        roundRect(x-16, y-12, 32, 24, 6);
        ctx.fill();
        ctx.stroke();

        // belly highlight
        ctx.fillStyle = "rgba(255,255,255,.15)";
        roundRect(x-12, y-5, 20, 12, 6);
        ctx.fill();

        // wing
        ctx.fillStyle = "#e2c54d";
        ctx.strokeStyle = "rgba(0,0,0,.55)";
        ctx.lineWidth = 3;
        roundRect(x-6, y-3 + flap, 14, 10, 4);
        ctx.fill(); ctx.stroke();

        // eye
        ctx.fillStyle = "#fff";
        ctx.strokeStyle = "rgba(0,0,0,.65)";
        ctx.lineWidth = 3;
        circle(x+7, y-5, 6);
        ctx.fill(); ctx.stroke();

        ctx.fillStyle = "#111";
        circle(x+9, y-5, 2.4);
        ctx.fill();

        // beak
        ctx.fillStyle = "#e04a3a";
        ctx.strokeStyle = "rgba(0,0,0,.65)";
        ctx.lineWidth = 3;
        roundRect(x+12, y-4, 18, 10, 4);
        ctx.fill(); ctx.stroke();

        // beak highlight
        ctx.fillStyle = "rgba(255,255,255,.15)";
        roundRect(x+14, y-3, 10, 3, 2);
        ctx.fill();

        ctx.lineWidth = 1;

        function roundRect(rx, ry, rw, rh, r) {
          ctx.beginPath();
          ctx.moveTo(rx + r, ry);
          ctx.arcTo(rx + rw, ry, rx + rw, ry + rh, r);
          ctx.arcTo(rx + rw, ry + rh, rx, ry + rh, r);
          ctx.arcTo(rx, ry + rh, rx, ry, r);
          ctx.arcTo(rx, ry, rx + rw, ry, r);
          ctx.closePath();
        }
        function circle(cx, cy, cr) {
          ctx.beginPath();
          ctx.arc(cx, cy, cr, 0, Math.PI*2);
          ctx.closePath();
        }
      }

      function draw() {
        drawSky();
        drawCity();
        drawCloudBand();

        // pipes
        for (const p of pipes) drawPipe(p.x, p.topH);

        // ground
        drawGround();

        // bird
        drawBird();
      }

      function update() {
        t += 1;

        // background scroll
        if (state === State.PLAYING) {
          groundScroll += PIPE_SPEED * 2.2;
          cityScroll += PIPE_SPEED * 0.7;
        } else {
          // gentle idle drift
          groundScroll += 0.6;
          cityScroll += 0.15;
        }

        if (state === State.SPLASH) {
          // float bird
          bird.y = 250 + Math.sin(t * 0.06) * 10;
          bird.flapAnim += 0.20;
          return;
        }

        if (state === State.READY) {
          // bob + no pipes movement
          bird.y = 260 + Math.sin(t * 0.06) * 10;
          bird.flapAnim += 0.25;
          // keep one pipe visible offscreen? (we keep them static until play)
          return;
        }

        if (state === State.PLAYING) {
          bird.vy += GRAVITY;
          if (bird.vy > MAX_FALL) bird.vy = MAX_FALL;
          bird.y += bird.vy;
          bird.flapAnim += 0.35;

          // move pipes
          for (const p of pipes) p.x -= PIPE_SPEED;

          // spawn new pipes
          const last = pipes[pipes.length - 1];
          if (last && last.x < W - PIPE_SPAWN_DIST) addPipe(W + 10);

          // scoring + cleanup
          for (const p of pipes) {
            if (!p.passed && p.x + PIPE_W < bird.x) {
              p.passed = true;
              score += 1;
              topScoreEl.textContent = String(score);
            }
          }
          pipes = pipes.filter(p => p.x > -PIPE_W - 20);

          // collisions
          if (birdHitsGround()) {
            bird.y = H - GROUND_H - 12;
            endGame();
            return;
          }
          for (const p of pipes) {
            if (birdHitsPipe(p)) {
              endGame();
              return;
            }
          }
        }

        if (state === State.GAMEOVER) {
          // little settle
          if (!birdHitsGround()) {
            bird.vy += GRAVITY;
            if (bird.vy > MAX_FALL) bird.vy = MAX_FALL;
            bird.y += bird.vy;
          } else {
            bird.y = H - GROUND_H - 12;
          }
          bird.flapAnim += 0.18;
        }
      }

      function loop() {
        update();
        draw();
        requestAnimationFrame(loop);
      }

      function flap() {
        if (state === State.SPLASH) {
          // go to ready screen like screenshot 3
          resetRun();
          setState(State.READY);
          return;
        }
        if (state === State.READY) {
          setState(State.PLAYING);
          bird.vy = FLAP;
          bird.flapAnim += 1.2;
          return;
        }
        if (state === State.PLAYING) {
          bird.vy = FLAP;
          bird.flapAnim += 1.2;
        }
      }

      // Controls (tap/click/space)
      function onPrimaryInput(e) {
        // avoid double-trigger for button clicks
        if (e && e.target && (e.target.closest("button"))) return;
        flap();
      }

      window.addEventListener("keydown", (e) => {
        if (e.code === "Space" || e.code === "ArrowUp") {
          e.preventDefault();
          flap();
        }
      }, { passive: false });

      canvas.addEventListener("pointerdown", onPrimaryInput);
      document.getElementById("stage").addEventListener("pointerdown", onPrimaryInput);

      // Buttons
      startBtn.addEventListener("click", () => {
        resetRun();
        setState(State.READY);
      });

      playBtn.addEventListener("click", () => {
        resetRun();
        setState(State.READY);
      });

      shareBtn.addEventListener("click", async () => {
        const text = `I scored ${score} in Flappy Bird! Can you beat me?`;
        const url = location.href;

        try {
          if (navigator.share) {
            await navigator.share({ title: "Flappy Bird", text, url });
          } else {
            await navigator.clipboard.writeText(`${text}\n${url}`);
            alert("Link copied!");
          }
        } catch {
          // user cancelled or blocked
        }
      });

      // Init
      setState(State.SPLASH);
      loop();
    })();
  </script>
</body>
</html>
