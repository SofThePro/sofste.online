<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Retro Platformer</title>
<style>
  body {
    margin: 0;
    background: black;
    overflow: hidden;
  }
  canvas {
    display: block;
    margin: auto;
    background: #5c94fc; /* Retro sky blue */
    image-rendering: pixelated;
  }
</style>
</head>
<body>

<canvas id="game" width="800" height="400"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const gravity = 0.6;
const keys = {};

document.addEventListener("keydown", e => keys[e.code] = true);
document.addEventListener("keyup", e => keys[e.code] = false);

class Player {
  constructor() {
    this.x = 100;
    this.y = 300;
    this.width = 30;
    this.height = 30;
    this.dx = 0;
    this.dy = 0;
    this.speed = 4;
    this.jumpPower = -12;
    this.grounded = false;
  }

  update() {
    // Movement
    if (keys["ArrowLeft"]) this.dx = -this.speed;
    else if (keys["ArrowRight"]) this.dx = this.speed;
    else this.dx = 0;

    if (keys["Space"] && this.grounded) {
      this.dy = this.jumpPower;
      this.grounded = false;
    }

    this.dy += gravity;
    this.x += this.dx;
    this.y += this.dy;

    // Floor collision
    if (this.y + this.height > canvas.height - 40) {
      this.y = canvas.height - 40 - this.height;
      this.dy = 0;
      this.grounded = true;
    }

    // Platform collisions
    platforms.forEach(platform => {
      if (this.x < platform.x + platform.width &&
          this.x + this.width > platform.x &&
          this.y < platform.y + platform.height &&
          this.y + this.height > platform.y) {

          if (this.dy > 0) {
            this.y = platform.y - this.height;
            this.dy = 0;
            this.grounded = true;
          }
      }
    });
  }

  draw() {
    ctx.fillStyle = "red";
    ctx.fillRect(this.x, this.y, this.width, this.height);
  }
}

class Platform {
  constructor(x, y, width, height) {
    this.x = x;
    this.y = y;
    this.width = width;
    this.height = height;
  }

  draw() {
    ctx.fillStyle = "#8B4513"; // brown
    ctx.fillRect(this.x, this.y, this.width, this.height);
  }
}

class Enemy {
  constructor(x, y) {
    this.x = x;
    this.y = y;
    this.width = 30;
    this.height = 30;
    this.speed = 2;
    this.direction = 1;
  }

  update() {
    this.x += this.speed * this.direction;

    // Turn around at edges
    if (this.x <= 0 || this.x + this.width >= canvas.width) {
      this.direction *= -1;
    }

    // Collision with player
    if (player.x < this.x + this.width &&
        player.x + player.width > this.x &&
        player.y < this.y + this.height &&
        player.y + player.height > this.y) {

        alert("Game Over!");
        document.location.reload();
    }
  }

  draw() {
    ctx.fillStyle = "green";
    ctx.fillRect(this.x, this.y, this.width, this.height);
  }
}

const player = new Player();

const platforms = [
  new Platform(200, 300, 120, 20),
  new Platform(400, 250, 120, 20),
  new Platform(600, 200, 120, 20)
];

const enemies = [
  new Enemy(500, 330)
];

function drawGround() {
  ctx.fillStyle = "#654321";
  ctx.fillRect(0, canvas.height - 40, canvas.width, 40);
}

function gameLoop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  drawGround();

  platforms.forEach(p => p.draw());

  player.update();
  player.draw();

  enemies.forEach(e => {
    e.update();
    e.draw();
  });

  requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
