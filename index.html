<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Glowing Text</title>
  <style>
    body {
      background-color: black;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .glow {
      font-size: 60px;
      color: #fff;
      text-align: center;
      animation: glow 1.5s ease-in-out infinite alternate;
    }

    @keyframes glow {
      from {
        text-shadow: 
          0 0 10px #fff,
          0 0 20px #0ff,
          0 0 30px #0ff,
          0 0 40px #0ff;
      }
      to {
        text-shadow: 
          0 0 20px #fff,
          0 0 30px #0ff,
          0 0 40px #0ff,
          0 0 50px #0ff;
      }
    }
  </style>
</head>
<body>
  <div class="glow">yo yo yo</div>
</body>
</html>
